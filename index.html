<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPlug Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --border: #232736;
      --on: #00e5a0;
      --off: #ff3d5a;
      --text: #e8eaf0;
      --muted: #565b73;
      --accent: #3d7fff;
      --glow-on: 0 0 18px rgba(0, 229, 160, 0.35);
      --glow-off: 0 0 18px rgba(255, 61, 90, 0.35);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(61, 127, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 229, 160, 0.05) 0%, transparent 60%);
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border: 2px solid var(--on);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-on);
      flex-shrink: 0;
    }

    .logo svg {
      width: 18px;
      height: 18px;
      fill: var(--on);
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.3rem;
      letter-spacing: 0.18em;
      color: var(--text);
    }

    h1 span {
      color: var(--on);
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: var(--card-shadow);
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--muted), transparent);
      transition: background 0.4s;
    }

    .card.active::before {
      background: linear-gradient(90deg, transparent, var(--on), transparent);
    }

    .card.active {
      border-color: rgba(0, 229, 160, 0.22);
      box-shadow: var(--card-shadow), 0 0 30px rgba(0, 229, 160, 0.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .plug-icon {
      width: 40px;
      height: 40px;
      background: var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .card.active .plug-icon {
      background: rgba(0, 229, 160, 0.12);
    }

    .plug-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--muted);
      transition: stroke 0.3s;
    }

    .card.active .plug-icon svg {
      stroke: var(--on);
    }

    .card-title-group {
      flex: 1;
    }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .card-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: none;
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .card.active .status-dot {
      background: var(--on);
      box-shadow: 0 0 8px var(--on);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: 11px 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.15s;
    }

    button:active::after {
      opacity: 0.08;
    }

    .btn-on {
      background: rgba(0, 229, 160, 0.12);
      color: var(--on);
      border: 1px solid rgba(0, 229, 160, 0.3);
    }

    .btn-on:hover {
      background: rgba(0, 229, 160, 0.22);
      border-color: var(--on);
      box-shadow: var(--glow-on);
    }

    .btn-off {
      background: rgba(255, 61, 90, 0.1);
      color: var(--off);
      border: 1px solid rgba(255, 61, 90, 0.25);
    }

    .btn-off:hover {
      background: rgba(255, 61, 90, 0.2);
      border-color: var(--off);
      box-shadow: var(--glow-off);
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .timer-label {
      font-size: 0.72rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .timer-input {
      flex: 1;
      background: transparent;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      color: var(--text);
      text-align: right;
      outline: none;
      width: 0;
      /* allow flex to control */
      min-width: 0;
    }

    .timer-input::-webkit-inner-spin-button,
    .timer-input::-webkit-outer-spin-button {
      opacity: 0.4;
    }

    .timer-unit {
      font-size: 0.72rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .btn-timer {
      background: rgba(61, 127, 255, 0.12);
      color: var(--accent);
      border: 1px solid rgba(61, 127, 255, 0.28);
      padding: 8px 14px;
      font-size: 0.75rem;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .btn-timer:hover {
      background: rgba(61, 127, 255, 0.22);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(61, 127, 255, 0.3);
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    .card-enter {
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
